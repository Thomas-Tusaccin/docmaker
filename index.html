<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css" class="css">
    <title>DocMaker</title>
</head>
<body>
    <script type="module" src="./main.ts"></script>

    <header>
        <input type="file" class="hidden" accept="text/markdown" id="input-import">
        <button id="import">Importer un fichier</button>
    
        <select id="add">
            <option value="" disabled selected>Ajouter</option>

            <option value="line">Ligne</option>

            <option value="heading1">Titre de niveau 1</option>
            <option value="heading2">Titre de niveau 2</option>
            <option value="heading3">Titre de niveau 3</option>
            <option value="heading4">Titre de niveau 4</option>
            <option value="heading5">Titre de niveau 5</option>
            <option value="heading6">Titre de niveau 6</option>

            <option value="paragraph">Paragraphe</option>

            <option value="ulist">Liste non-ordonnée</option>
            <option value="olist">Liste numérotée</option>
            
            <option value="image">Image</option>

            <option value="note">Encadré note</option>
            <option value="info">Encadré info</option>
            <option value="warning">Encadré warning</option>
            <option value="success">Encadré succès</option>
            <option value="danger">Encadré danger</option>
            <option value="example">Encadré exemple</option>
            
            <option value="code">Bloc de code</option>
            <option value="formula">Formule mathématique</option>
        </select>

        

        <button id="bold" class="edit-button icon">G</button>
        <button id="italic" class="edit-button icon">I</button>
        <button id="highlight" class="edit-button icon">H</button>
        <button id="inline-code" class="edit-button icon">C</button>

        <div id="file-name-div">
            <label for="fileName">Nom du fichier</label>
            <input type="text" id="fileName" size="20">
            <input type="text" value=".md" size="3" readonly>
            <button id="export">Exporter en Markdown</button>
        </div>
    </header>

    <main>
        <div id="editor"></div>
    </main>
</body>
</html>
